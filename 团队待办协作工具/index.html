<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>团队待办协作工具 · MVP 原型</title>
    <style>
        /* === Reset & Variables === */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --primary: #4f46e5;
            --primary-light: #eef2ff;
            --primary-dark: #4338ca;
            --success: #16a34a;
            --success-bg: #dcfce7;
            --warning: #d97706;
            --warning-bg: #fef3c7;
            --danger: #dc2626;
            --danger-bg: #fee2e2;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --gray-900: #111827;
            --white: #ffffff;
            --radius: 10px;
            --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
            --shadow-lg: 0 4px 24px rgba(0,0,0,0.08);
            --transition: 0.2s ease;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--gray-50);
            color: var(--gray-800);
            line-height: 1.5;
            min-height: 100vh;
        }

        /* === Layout === */
        .app-header {
            background: var(--white);
            border-bottom: 1px solid var(--gray-200);
            padding: 16px 24px;
            position: sticky;
            top: 0;
            z-index: 50;
            backdrop-filter: blur(8px);
            background: rgba(255,255,255,0.9);
        }
        .app-header-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .app-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--gray-900);
        }
        .app-title .logo-mark {
            width: 32px; height: 32px;
            background: linear-gradient(135deg, var(--primary), #7c3aed);
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 0.85rem;
            font-weight: 800;
        }
        .app-header-right {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 0.85rem;
            color: var(--gray-500);
        }
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .status-badge.online {
            background: var(--success-bg);
            color: var(--success);
        }
        .status-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--success);
        }

        .main-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px 24px 48px;
        }

        /* === Stats Bar === */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: var(--white);
            border-radius: var(--radius);
            padding: 16px 20px;
            border: 1px solid var(--gray-200);
            box-shadow: var(--shadow);
        }
        .stat-card .stat-label {
            font-size: 0.8rem;
            color: var(--gray-400);
            font-weight: 500;
            margin-bottom: 4px;
        }
        .stat-card .stat-number {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--gray-900);
        }
        .stat-card .stat-number.primary { color: var(--primary); }
        .stat-card .stat-number.success { color: var(--success); }
        .stat-card .stat-number.warning { color: var(--warning); }

        /* === Toolbar === */
        .toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
        }
        .toolbar-left {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .toolbar-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .filter-btn {
            padding: 6px 14px;
            border: 1px solid var(--gray-200);
            border-radius: 20px;
            background: var(--white);
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--gray-600);
            cursor: pointer;
            transition: all var(--transition);
        }
        .filter-btn:hover { border-color: var(--primary); color: var(--primary); }
        .filter-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            color: var(--white);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all var(--transition);
        }
        .btn-primary {
            background: var(--primary);
            color: var(--white);
        }
        .btn-primary:hover {
            background: var(--primary-dark);
            box-shadow: 0 2px 8px rgba(79,70,229,0.3);
        }
        .btn-outline {
            background: transparent;
            border: 1.5px solid var(--gray-200);
            color: var(--gray-600);
        }
        .btn-outline:hover {
            border-color: var(--primary);
            color: var(--primary);
        }
        .btn-sm {
            padding: 4px 10px;
            font-size: 0.8rem;
        }
        .btn-icon {
            width: 32px; height: 32px;
            padding: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            background: transparent;
            border: none;
            cursor: pointer;
            color: var(--gray-400);
            transition: all var(--transition);
        }
        .btn-icon:hover {
            background: var(--gray-100);
            color: var(--gray-600);
        }
        .btn-icon.danger:hover {
            background: var(--danger-bg);
            color: var(--danger);
        }

        /* === Board === */
        .board {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 16px;
        }
        @media (max-width: 900px) {
            .board { grid-template-columns: 1fr; }
        }

        .column {
            background: var(--gray-100);
            border-radius: var(--radius);
            padding: 16px;
            min-height: 200px;
        }
        .column-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--gray-200);
        }
        .column-title {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--gray-700);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .column-count {
            background: var(--gray-200);
            color: var(--gray-600);
            font-size: 0.75rem;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 12px;
        }
        .column.todo .column-header { border-bottom-color: var(--gray-400); }
        .column.in-progress .column-header { border-bottom-color: var(--primary); }
        .column.done .column-header { border-bottom-color: var(--success); }

        /* === Task Card === */
        .task-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-height: 60px;
        }
        .task-card {
            background: var(--white);
            border-radius: 8px;
            padding: 14px 16px;
            border: 1px solid var(--gray-200);
            box-shadow: var(--shadow);
            transition: all var(--transition);
            cursor: default;
        }
        .task-card:hover {
            border-color: var(--gray-300);
            box-shadow: var(--shadow-lg);
        }
        .task-card-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 8px;
        }
        .task-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--gray-800);
            flex: 1;
            word-break: break-word;
        }
        .task-card.done .task-title {
            text-decoration: line-through;
            color: var(--gray-400);
        }
        .task-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .task-assignee {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 0.78rem;
            color: var(--gray-500);
            font-weight: 500;
        }
        .task-assignee .avatar {
            width: 22px; height: 22px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.65rem;
            font-weight: 700;
            color: white;
            flex-shrink: 0;
        }
        .priority-tag {
            font-size: 0.7rem;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 4px;
        }
        .priority-tag.high {
            background: var(--danger-bg);
            color: var(--danger);
        }
        .priority-tag.medium {
            background: var(--warning-bg);
            color: var(--warning);
        }
        .priority-tag.low {
            background: var(--success-bg);
            color: var(--success);
        }
        .task-actions {
            display: flex;
            gap: 2px;
            opacity: 0;
            transition: opacity var(--transition);
        }
        .task-card:hover .task-actions {
            opacity: 1;
        }
        .task-actions .btn-icon {
            width: 26px; height: 26px;
            font-size: 0.75rem;
        }
        .task-date {
            font-size: 0.72rem;
            color: var(--gray-400);
        }

        /* === Modal === */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(4px);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.open {
            display: flex;
        }
        .modal {
            background: var(--white);
            border-radius: 14px;
            padding: 28px;
            width: 90%;
            max-width: 480px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
        }
        .modal-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--gray-900);
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--gray-700);
            margin-bottom: 6px;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid var(--gray-200);
            border-radius: 8px;
            font-size: 0.9rem;
            font-family: inherit;
            color: var(--gray-800);
            transition: border-color var(--transition);
            outline: none;
            background: var(--white);
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79,70,229,0.1);
        }
        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }
        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 24px;
        }

        /* === Empty State === */
        .empty-state {
            text-align: center;
            padding: 32px 16px;
            color: var(--gray-400);
        }
        .empty-state .empty-icon {
            font-size: 2rem;
            margin-bottom: 8px;
        }
        .empty-state .empty-text {
            font-size: 0.85rem;
        }

        /* === Inline editing === */
        .inline-edit {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }
        .inline-edit input {
            flex: 1;
            padding: 6px 10px;
            border: 1.5px solid var(--primary);
            border-radius: 6px;
            font-size: 0.85rem;
            outline: none;
        }
        .inline-edit .btn-sm {
            padding: 4px 10px;
            font-size: 0.75rem;
        }

        /* === Prototype Notice === */
        .prototype-notice {
            background: var(--warning-bg);
            border: 1px solid #fbbf24;
            border-radius: var(--radius);
            padding: 12px 16px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
            color: var(--gray-700);
        }
        .prototype-notice .notice-icon {
            font-size: 1.2rem;
        }

        /* === Responsive === */
        @media (max-width: 640px) {
            .app-header-inner { flex-wrap: wrap; gap: 8px; }
            .stats-bar { grid-template-columns: 1fr 1fr; }
            .toolbar { flex-direction: column; align-items: stretch; }
            .toolbar-left, .toolbar-right { justify-content: center; }
            .modal { padding: 20px; }
        }
    </style>
</head>
<body>

<!-- Header -->
<header class="app-header">
    <div class="app-header-inner">
        <div class="app-title">
            <span class="logo-mark">✓</span>
            团队待办协作
        </div>
        <div class="app-header-right">
            <span class="status-badge online">
                <span class="status-dot"></span>
                MVP 原型 · 数据本地存储
            </span>
        </div>
    </div>
</header>

<!-- Main -->
<div class="main-container">

    <!-- Prototype Notice -->
    <div class="prototype-notice">
        <span class="notice-icon">🧪</span>
        <span>MVP 原型演示 — 数据存储在浏览器本地 (localStorage)。纯前端实现，无后端依赖。团队成员和示例数据为硬编码。</span>
    </div>

    <!-- Stats Bar -->
    <div class="stats-bar" id="statsBar">
        <div class="stat-card">
            <div class="stat-label">总任务</div>
            <div class="stat-number" id="statTotal">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">待处理</div>
            <div class="stat-number warning" id="statTodo">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">进行中</div>
            <div class="stat-number primary" id="statInProgress">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">已完成</div>
            <div class="stat-number success" id="statDone">0</div>
        </div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
        <div class="toolbar-left">
            <button class="filter-btn active" data-filter="all">全部</button>
            <button class="filter-btn" data-filter="张三">张三</button>
            <button class="filter-btn" data-filter="李四">李四</button>
            <button class="filter-btn" data-filter="王五">王五</button>
        </div>
        <div class="toolbar-right">
            <button class="btn btn-primary" id="btnAddTask">+ 新建任务</button>
        </div>
    </div>

    <!-- Board -->
    <div class="board">
        <!-- Todo Column -->
        <div class="column todo">
            <div class="column-header">
                <div class="column-title">
                    📋 待处理
                    <span class="column-count" id="countTodo">0</span>
                </div>
            </div>
            <div class="task-list drop-zone" data-status="todo" id="listTodo"></div>
        </div>

        <!-- In Progress Column -->
        <div class="column in-progress">
            <div class="column-header">
                <div class="column-title">
                    ⏳ 进行中
                    <span class="column-count" id="countInProgress">0</span>
                </div>
            </div>
            <div class="task-list drop-zone" data-status="in-progress" id="listInProgress"></div>
        </div>

        <!-- Done Column -->
        <div class="column done">
            <div class="column-header">
                <div class="column-title">
                    ✅ 已完成
                    <span class="column-count" id="countDone">0</span>
                </div>
            </div>
            <div class="task-list drop-zone" data-status="done" id="listDone"></div>
        </div>
    </div>
</div>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <div class="modal-title" id="modalTitle">新建任务</div>
        <form id="taskForm" onsubmit="return false;">
            <input type="hidden" id="editTaskId" value="">
            <div class="form-group">
                <label for="taskTitle">任务标题 *</label>
                <input type="text" id="taskTitle" placeholder="输入任务标题..." required>
            </div>
            <div class="form-group">
                <label for="taskDesc">描述</label>
                <textarea id="taskDesc" placeholder="可选：补充任务详情..."></textarea>
            </div>
            <div class="form-group">
                <label for="taskAssignee">负责人</label>
                <select id="taskAssignee">
                    <option value="张三">张三</option>
                    <option value="李四">李四</option>
                    <option value="王五">王五</option>
                </select>
            </div>
            <div class="form-group">
                <label for="taskPriority">优先级</label>
                <select id="taskPriority">
                    <option value="low">🟢 低</option>
                    <option value="medium" selected>🟡 中</option>
                    <option value="high">🔴 高</option>
                </select>
            </div>
            <div class="form-group">
                <label for="taskStatus">状态</label>
                <select id="taskStatus">
                    <option value="todo">📋 待处理</option>
                    <option value="in-progress">⏳ 进行中</option>
                    <option value="done">✅ 已完成</option>
                </select>
            </div>
            <div class="modal-actions">
                <button type="button" class="btn btn-outline" id="btnCancel">取消</button>
                <button type="submit" class="btn btn-primary" id="btnSave">保存</button>
            </div>
        </form>
    </div>
</div>

<script>
(function() {
    'use strict';

    // === Team Members ===
    const TEAM = {
        '张三': { color: '#4f46e5', initials: '张' },
        '李四': { color: '#0891b2', initials: '李' },
        '王五': { color: '#7c3aed', initials: '王' },
    };

    // === Priority Labels ===
    const PRIORITY = {
        high: { label: '高', cls: 'high' },
        medium: { label: '中', cls: 'medium' },
        low: { label: '低', cls: 'low' },
    };

    // === Status Labels ===
    const STATUS_LABEL = {
        'todo': '待处理',
        'in-progress': '进行中',
        'done': '已完成',
    };

    // === Hardcoded Seed Data ===
    const SEED_TASKS = [
        { id: '1', title: '设计任务卡片组件', desc: '完成卡片组件的UI设计和交互', assignee: '张三', priority: 'high', status: 'done', createdAt: Date.now() - 86400000 * 3 },
        { id: '2', title: '实现任务CRUD API', desc: '后端接口：创建、查看、更新、删除任务', assignee: '李四', priority: 'high', status: 'in-progress', createdAt: Date.now() - 86400000 * 2 },
        { id: '3', title: '搭建项目技术架构', desc: '确定前端框架、后端语言、数据库选型', assignee: '李四', priority: 'medium', status: 'done', createdAt: Date.now() - 86400000 * 4 },
        { id: '4', title: '用户登录页面开发', desc: '接入SSO登录，实现用户认证流程', assignee: '王五', priority: 'medium', status: 'todo', createdAt: Date.now() - 86400000 },
        { id: '5', title: '编写单元测试', desc: '为核心逻辑模块编写单元测试，覆盖率≥80%', assignee: '张三', priority: 'low', status: 'todo', createdAt: Date.now() - 43200000 },
        { id: '6', title: 'Code Review - 任务模块', desc: 'Review李四提交的任务模块PR', assignee: '张三', priority: 'high', status: 'in-progress', createdAt: Date.now() - 21600000 },
        { id: '7', title: '数据库索引优化', desc: '分析慢查询，为task表添加合理索引', assignee: '李四', priority: 'medium', status: 'todo', createdAt: Date.now() - 10800000 },
        { id: '8', title: '撰写项目README文档', desc: '包括项目简介、启动方式、API文档链接', assignee: '王五', priority: 'low', status: 'done', createdAt: Date.now() - 7200000 },
    ];

    // === State ===
    let tasks = [];
    let currentFilter = 'all';

    // === DOM Refs ===
    const $ = (sel) => document.querySelector(sel);
    const $$ = (sel) => document.querySelectorAll(sel);

    const listTodo = $('#listTodo');
    const listInProgress = $('#listInProgress');
    const listDone = $('#listDone');
    const countTodo = $('#countTodo');
    const countInProgress = $('#countInProgress');
    const countDone = $('#countDone');
    const statTotal = $('#statTotal');
    const statTodo = $('#statTodo');
    const statInProgress = $('#statInProgress');
    const statDone = $('#statDone');

    const modalOverlay = $('#modalOverlay');
    const modalTitle = $('#modalTitle');
    const taskForm = $('#taskForm');
    const editTaskId = $('#editTaskId');
    const taskTitle = $('#taskTitle');
    const taskDesc = $('#taskDesc');
    const taskAssignee = $('#taskAssignee');
    const taskPriority = $('#taskPriority');
    const taskStatus = $('#taskStatus');
    const btnAddTask = $('#btnAddTask');
    const btnCancel = $('#btnCancel');
    const btnSave = $('#btnSave');

    // === Load / Save ===
    function loadTasks() {
        try {
            const data = localStorage.getItem('team_todo_tasks');
            if (data) {
                tasks = JSON.parse(data);
            } else {
                tasks = SEED_TASKS;
                saveTasks();
            }
        } catch(e) {
            tasks = SEED_TASKS;
            saveTasks();
        }
    }

    function saveTasks() {
        localStorage.setItem('team_todo_tasks', JSON.stringify(tasks));
    }

    function generateId() {
        return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
    }

    // === Render ===
    function getFilteredTasks() {
        if (currentFilter === 'all') return tasks;
        return tasks.filter(t => t.assignee === currentFilter);
    }

    function render() {
        const filtered = getFilteredTasks();
        const todoTasks = filtered.filter(t => t.status === 'todo');
        const inProgressTasks = filtered.filter(t => t.status === 'in-progress');
        const doneTasks = filtered.filter(t => t.status === 'done');

        // Sort by priority (high first), then by creation time (newest first)
        const sortFn = (a, b) => {
            const prio = { high: 0, medium: 1, low: 2 };
            const pDiff = (prio[a.priority] || 1) - (prio[b.priority] || 1);
            if (pDiff !== 0) return pDiff;
            return b.createdAt - a.createdAt;
        };

        renderList(listTodo, todoTasks.sort(sortFn));
        renderList(listInProgress, inProgressTasks.sort(sortFn));
        renderList(listDone, doneTasks.sort(sortFn));

        // Counts
        countTodo.textContent = todoTasks.length;
        countInProgress.textContent = inProgressTasks.length;
        countDone.textContent = doneTasks.length;

        // Stats
        statTotal.textContent = tasks.length;
        statTodo.textContent = tasks.filter(t => t.status === 'todo').length;
        statInProgress.textContent = tasks.filter(t => t.status === 'in-progress').length;
        statDone.textContent = tasks.filter(t => t.status === 'done').length;
    }

    function renderList(container, items) {
        if (items.length === 0) {
            container.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">暂无任务</div></div>`;
            return;
        }
        container.innerHTML = items.map(task => renderTaskCard(task)).join('');
    }

    function renderTaskCard(task) {
        const member = TEAM[task.assignee] || { color: '#6b7280', initials: '?' };
        const prio = PRIORITY[task.priority] || PRIORITY.medium;
        const doneCls = task.status === 'done' ? 'done' : '';

        const dateStr = new Date(task.createdAt).toLocaleDateString('zh-CN', {
            month: 'short', day: 'numeric',
        });

        return `
            <div class="task-card ${doneCls}" data-id="${task.id}">
                <div class="task-card-header">
                    <div class="task-title">${escapeHtml(task.title)}</div>
                    <div class="task-actions">
                        <button class="btn-icon" data-action="move-left" title="左移状态" ${task.status === 'todo' ? 'disabled style="opacity:0.3;cursor:not-allowed;"' : ''}>◀</button>
                        <button class="btn-icon" data-action="move-right" title="右移状态" ${task.status === 'done' ? 'disabled style="opacity:0.3;cursor:not-allowed;"' : ''}>▶</button>
                        <button class="btn-icon" data-action="edit" title="编辑">✎</button>
                        <button class="btn-icon danger" data-action="delete" title="删除">✕</button>
                    </div>
                </div>
                ${task.desc ? `<div style="font-size:0.8rem;color:var(--gray-400);margin-bottom:8px;">${escapeHtml(task.desc)}</div>` : ''}
                <div class="task-meta">
                    <span class="task-assignee">
                        <span class="avatar" style="background:${member.color}">${member.initials}</span>
                        ${escapeHtml(task.assignee)}
                    </span>
                    <span class="priority-tag ${prio.cls}">${prio.label}</span>
                    <span class="task-date">${dateStr}</span>
                </div>
            </div>
        `;
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // === Event Handling (Delegated) ===
    function handleCardAction(e) {
        const btn = e.target.closest('[data-action]');
        if (!btn) return;
        const card = btn.closest('.task-card');
        if (!card) return;
        const id = card.dataset.id;
        const action = btn.dataset.action;

        if (action === 'delete') {
            if (confirm('确定删除这个任务吗？')) {
                tasks = tasks.filter(t => t.id !== id);
                saveTasks();
                render();
            }
        } else if (action === 'edit') {
            openEditModal(id);
        } else if (action === 'move-left') {
            moveTask(id, -1);
        } else if (action === 'move-right') {
            moveTask(id, 1);
        }
    }

    function moveTask(id, direction) {
        const task = tasks.find(t => t.id === id);
        if (!task) return;
        const order = ['todo', 'in-progress', 'done'];
        const idx = order.indexOf(task.status);
        if (idx === -1) return;
        const newIdx = idx + direction;
        if (newIdx < 0 || newIdx >= order.length) return;
        task.status = order[newIdx];
        saveTasks();
        render();
    }

    // === Filter ===
    function initFilters() {
        $$('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                $$('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                render();
            });
        });
    }

    // === Modal ===
    function openAddModal() {
        modalTitle.textContent = '新建任务';
        editTaskId.value = '';
        taskForm.reset();
        taskPriority.value = 'medium';
        taskStatus.value = 'todo';
        modalOverlay.classList.add('open');
        taskTitle.focus();
    }

    function openEditModal(id) {
        const task = tasks.find(t => t.id === id);
        if (!task) return;
        modalTitle.textContent = '编辑任务';
        editTaskId.value = id;
        taskTitle.value = task.title;
        taskDesc.value = task.desc || '';
        taskAssignee.value = task.assignee;
        taskPriority.value = task.priority;
        taskStatus.value = task.status;
        modalOverlay.classList.add('open');
        taskTitle.focus();
    }

    function closeModal() {
        modalOverlay.classList.remove('open');
    }

    function handleFormSubmit(e) {
        e.preventDefault();
        const title = taskTitle.value.trim();
        if (!title) {
            alert('请输入任务标题');
            return;
        }
        const desc = taskDesc.value.trim();
        const assignee = taskAssignee.value;
        const priority = taskPriority.value;
        const status = taskStatus.value;
        const editId = editTaskId.value;

        if (editId) {
            // Update existing
            const task = tasks.find(t => t.id === editId);
            if (task) {
                task.title = title;
                task.desc = desc;
                task.assignee = assignee;
                task.priority = priority;
                task.status = status;
            }
        } else {
            // Create new
            tasks.push({
                id: generateId(),
                title,
                desc,
                assignee,
                priority,
                status,
                createdAt: Date.now(),
            });
        }
        saveTasks();
        closeModal();
        render();
    }

    // === Event Listeners ===
    function init() {
        loadTasks();
        render();

        // Card actions via delegation
        document.querySelectorAll('.task-list').forEach(list => {
            list.addEventListener('click', handleCardAction);
        });

        // Filter
        initFilters();

        // Modal
        btnAddTask.addEventListener('click', openAddModal);
        btnCancel.addEventListener('click', closeModal);
        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) closeModal();
        });
        taskForm.addEventListener('submit', handleFormSubmit);

        // Keyboard: close on Escape
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && modalOverlay.classList.contains('open')) {
                closeModal();
            }
        });
    }

    // === Boot ===
    document.addEventListener('DOMContentLoaded', init);
})();
</script>
</body>
</html>
